<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Mate Louis Smart — AI Content Generator</title>
  <meta name="description" content="Generate viral content, hooks, scripts, and product descriptions with AI. Mate Louis Smart helps you create 6 months of content in minutes." />
  <meta name="theme-color" content="#fafaf9" />
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <!-- Open Graph -->
  <meta property="og:title" content="Mate Louis Smart — AI Content Generator" />
  <meta property="og:description" content="Generate viral content, hooks, scripts, and product descriptions with AI." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/wizard-louis.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="color-scheme" content="light" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mate Louis" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/chat.css" />
</head>
<body>
  <a href="#chat" class="sr-only" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;padding:8px 16px;background:#5b6cff;color:#fff;text-decoration:none;border-radius:4px;" onfocus="this.style.left='8px';this.style.top='8px';this.style.width='auto';this.style.height='auto';" onblur="this.style.left='-9999px';">Skip to chat</a>
  <div id="app-bootstrap-loader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fcfbf7; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.4s ease, visibility 0.4s ease; font-family: 'Inter', sans-serif;">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1.2s linear infinite;">
        <path d="M12 2v3"/>
        <path d="M12 19v3"/>
        <path d="M4.93 4.93l2.12 2.12"/>
        <path d="M16.95 16.95l2.12 2.12"/>
        <path d="M2 12h3"/>
        <path d="M19 12h3"/>
        <path d="M4.93 19.07l2.12-2.12"/>
        <path d="M16.95 7.05l2.12-2.12"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <div style="color: #44403c; font-size: 14px; font-weight: 500; letter-spacing: 0.3px;">Loading...</div>
    </div>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </div>
  <div class="app sidebar-collapsed" id="app" style="opacity: 0; transition: opacity 0.3s ease;">
    <aside class="sidebar" id="sidebar" aria-label="Conversations">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3"/><path d="M12 19v3"/><path d="M4.93 4.93l2.12 2.12"/><path d="M16.95 16.95l2.12 2.12"/><path d="M2 12h3"/><path d="M19 12h3"/><path d="M4.93 19.07l2.12-2.12"/><path d="M16.95 7.05l2.12-2.12"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <span class="brand-name">Mate Louis</span>
        </div>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        <span>New chat</span>
      </button>

      <div class="sidebar-section-label">Recent</div>
      <nav class="recent-list" id="recentList" role="list" aria-label="Recent conversations"></nav>

      <button class="clear-all-btn" id="clearAllBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        <span>Delete all chats</span>
      </button>

      <div class="sidebar-footer">
        <div class="user-chip" role="button" tabindex="0" aria-label="User menu — click to logout">
          <div class="avatar"></div>
          <div class="user-meta">
            <div class="user-name"></div>
            <div class="user-sub"></div>
          </div>
        </div>
      </div>
    </aside>

    <div class="sidebar-scrim" id="sidebarScrim"></div>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h18"/></svg>
        </button>
        <div class="topbar-title">
          <span>Mate Louis Smart</span>
          <span class="model-tag">AI</span>
        </div>

        <div class="topbar-export-wrap" id="topbarExportWrap">
          <button class="icon-btn" id="topbarExportBtn" aria-label="Export conversation" title="Export conversation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <div class="topbar-export-dropdown" id="topbarExportDropdown">
            <div class="export-dropdown-section-label">Copy to Clipboard</div>
            <button class="export-dropdown-item" data-action="copy" data-filter="all">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              All Messages
            </button>
            <button class="export-dropdown-item" data-action="copy" data-filter="ai">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              AI Replies Only
            </button>
            <button class="export-dropdown-item" data-action="copy" data-filter="user">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              My Messages Only
            </button>
            <div class="export-dropdown-divider"></div>
            <div class="export-dropdown-section-label">Download PDF</div>
            <button class="export-dropdown-item" data-action="pdf" data-filter="all">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              All Messages
            </button>
            <button class="export-dropdown-item" data-action="pdf" data-filter="ai">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              AI Replies Only
            </button>
            <button class="export-dropdown-item" data-action="pdf" data-filter="user">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              My Messages Only
            </button>
          </div>
        </div>
      </header>

      <section class="chat" id="chat" aria-live="polite" role="log">
        <div class="empty" id="empty">
          <div class="empty-copy">
            <h1 class="empty-title">So smart it probably ignores your bad ideas.</h1>
            <p class="empty-sub">How can I help today?</p>
          </div>
          <div class="wizard-arena">
            <div class="wizard-stage" id="wizardStage">
              <div class="wizard-glow" aria-hidden="true"></div>
              <div class="wizard-smoke" aria-hidden="true"></div>
              <div class="wizard-floats" id="wizardFloats">
                <button type="button" class="float-chip premium-content-chip" data-slot="0">
                  <span class="premium-chip-text">Generate 6 months of content</span>
                  <img class="premium-crown" src="/premium-crown.png" alt="" aria-hidden="true" />
                </button>
                <button type="button" class="float-chip" data-slot="1">Generate viral hooks</button>
                <button type="button" class="float-chip" data-slot="2">Generate TikTok/Reels scripts</button>
                <button type="button" class="float-chip" data-slot="3">Make Product descriptions</button>
              </div>
              <img class="wizard-img" src="/wizard-louis.png" alt="Mate Louis wizard" width="280" height="320" />
            </div>
          </div>

        </div>
      </section>

      <div class="composer-wrap">
        <button class="stop-generation-btn" id="stopGenerationBtn" aria-label="Stop generating">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Stop generating
        </button>
        <div class="composer" id="composer" role="form" aria-label="Message composer">
          <div class="attachments" id="attachments"></div>
          <div class="composer-row">
            <button class="icon-btn attach-btn" id="attachBtn" aria-label="Attach image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15V8a2 2 0 0 0-2-2h-1.5l-1.7-2H9.2L7.5 6H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h9"/><circle cx="12" cy="13" r="3.5"/><path d="M18 17v6"/><path d="M15 20h6"/></svg>
            </button>
            <div class="attach-menu" id="attachMenu" hidden>
              <button class="attach-menu-item" id="attachGalleryBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                Photo Library
              </button>
              <button class="attach-menu-item" id="attachCameraBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                Take Selfie
              </button>
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple hidden />
            <input type="file" id="cameraInput" accept="image/*" capture="user" hidden />
            <textarea id="input" rows="1" placeholder="Message Mate Louis Smart…" autocomplete="off" aria-label="Type your message"></textarea>
            <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l14-7-7 14-2-5-5-2z"/></svg>
            </button>
          </div>
        </div>
        <div class="footnote">If Mate Louis Smart makes mistakes, that's on you!</div>
      </div>

      <!-- Camera / Selfie Modal -->
      <div class="camera-modal" id="cameraModal" hidden aria-hidden="true">
        <div class="camera-backdrop" id="cameraBackdrop"></div>
        <div class="camera-card">
          <div class="camera-header">
            <h3 class="camera-title">Take a Selfie</h3>
            <button class="camera-close-btn" id="cameraCloseBtn" aria-label="Close camera">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="camera-body">
            <div class="camera-viewfinder" id="cameraViewfinder">
              <video id="cameraVideo" autoplay playsinline muted></video>
              <canvas id="cameraCanvas" hidden></canvas>
              <img id="cameraPreview" hidden alt="Captured selfie" />
              <div class="camera-placeholder" id="cameraPlaceholder">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Starting camera…</span>
              </div>
            </div>
          </div>
          <div class="camera-actions" id="cameraActions">
            <button class="camera-btn camera-btn-capture" id="cameraCaptureBtn" aria-label="Take photo">
              <div class="capture-ring"></div>
            </button>
          </div>
          <div class="camera-actions" id="cameraReviewActions" hidden>
            <button class="camera-btn-text camera-btn-retake" id="cameraRetakeBtn">Retake</button>
            <button class="camera-btn-text camera-btn-use" id="cameraUseBtn">Use Photo</button>
          </div>
        </div>
      </div>

      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-card">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M5 21h14"/></svg>
          </div>
          <div class="drop-title">Drop images to attach</div>
        </div>
      </div>
    </main>
  </div>

  <div class="image-lightbox" id="imageLightbox" hidden aria-hidden="true">
    <button type="button" class="image-lightbox-backdrop" id="imageLightboxBackdrop" aria-label="Close preview"></button>
    <div class="image-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Image preview">
      <button type="button" class="image-lightbox-close" id="imageLightboxClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
      </button>
      <img class="image-lightbox-img" id="imageLightboxImg" alt="" />
      <div class="image-lightbox-actions">
        <button type="button" class="image-lightbox-download" id="imageLightboxDownload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M5 21h14"/></svg>
          Download
        </button>
      </div>
    </div>
  </div>



  <script type="module" src="/chat.js"></script>
</body>
</html>
