<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConversationManager Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      height: 80vh;
      max-height: 600px;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 16px 16px 0 0;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .session-id {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
      margin-top: 8px;
      word-break: break-all;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 2px;
    }

    .message.assistant .message-bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 2px;
    }

    .message-image {
      max-width: 100%;
      border-radius: 8px;
      cursor: pointer;
      max-height: 300px;
      object-fit: contain;
    }

    .image-thumbnail-preview {
      display: inline-block;
      position: relative;
      margin: 8px 0;
      border-radius: 8px;
      overflow: hidden;
      background: #f5f5f5;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .image-thumbnail-preview img {
      display: block;
      max-width: 200px;
      max-height: 150px;
      object-fit: contain;
    }

    .image-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .preview-area {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .input-controls {
      display: flex;
      gap: 10px;
    }

    .input-group {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    input[type="text"],
    input[type="file"],
    input[type="url"] {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="file"]:focus,
    input[type="url"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input[type="file"] {
      cursor: pointer;
    }

    button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.secondary {
      background: #f3f4f6;
      color: #1f2937;
    }

    button.secondary:hover:not(:disabled) {
      background: #e5e7eb;
    }

    .loading {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .webhook-input-group {
      display: flex;
      gap: 8px;
    }

    .webhook-input-group input {
      flex: 1;
      font-size: 12px;
    }

    .status {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }

    .status.visible {
      display: block;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .status.loading {
      background: #dbeafe;
      color: #0c4a6e;
      border: 1px solid #93c5fd;
    }

    .history-info {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      padding: 8px;
      background: #f9fafb;
      border-radius: 6px;
      margin-top: 8px;
    }

    .clear-btn {
      background: #ef4444;
    }

    .clear-btn:hover:not(:disabled) {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Chat with ConversationManager</h1>
      <p>Memory-only conversation history with image support</p>
      <div class="session-id" id="sessionInfo">Session: Loading...</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="webhook-input-group">
        <input 
          type="url" 
          id="webhookUrl" 
          placeholder="Enter webhook URL" 
          value="https://vmi3182726.contaboserver.net/webhook/4f4322b3-30eb-4d63-b7ea-d9d18558772c"
        />
      </div>

      <div class="preview-area" id="previewArea"></div>

      <div class="input-group">
        <input 
          type="text" 
          id="messageInput" 
          placeholder="Type your message..." 
          autocomplete="off"
        />
        <input 
          type="file" 
          id="imageInput" 
          accept="image/*" 
          style="display: none;"
        />
        <button id="attachBtn" title="Attach image">📎</button>
        <button id="sendBtn">Send</button>
      </div>

      <div id="status" class="status"></div>

      <div class="history-info">
        Messages: <span id="messageCount">0</span> | 
        <button class="secondary" id="clearBtn" style="padding: 4px 8px; font-size: 12px;">New Chat</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONVERSATION MANAGER - Memory-only Chat History
    // ============================================================
    const ConversationManager = {
      conversationHistory: [],
      pendingImage: null,
      sessionId: null,

      init() {
        this.conversationHistory = [];
        this.pendingImage = null;
        this.sessionId = this.generateSessionId();
        console.log('ConversationManager initialized with sessionId:', this.sessionId);
      },

      generateSessionId() {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
          return crypto.randomUUID();
        }
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      },

      addMessage(role, message, image = null) {
        const messageObj = {
          role,
          message: String(message || '').trim(),
          ...(image && { image })
        };
        this.conversationHistory.push(messageObj);
        console.log('Message added to history:', messageObj);
        return messageObj;
      },

      setPendingImage(base64String) {
        this.pendingImage = base64String;
        console.log('Pending image set:', base64String.substring(0, 50) + '...');
      },

      clearPendingImage() {
        this.pendingImage = null;
        console.log('Pending image cleared');
      },

      getPendingImage() {
        return this.pendingImage;
      },

      buildPayload(messageText) {
        const payload = {
          sessionId: this.sessionId,
          conversationHistory: this.conversationHistory,
          message: String(messageText || '').trim()
        };

        if (this.pendingImage) {
          payload.image = this.pendingImage;
        }

        return payload;
      },

      async sendToWebhook(messageText, webhookUrl) {
        const payload = this.buildPayload(messageText);
        console.log('Sending to webhook:', webhookUrl);
        console.log('Payload:', payload);

        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const responseData = await response.json();
        console.log('Webhook response:', responseData);
        return responseData;
      },

      processResponse(userMessage, response) {
        this.addMessage('user', userMessage, this.pendingImage || undefined);
        this.clearPendingImage();

        if (response.isImage && response.output) {
          this.addMessage('assistant', response.output, response.output);
        } else if (response.output) {
          this.addMessage('assistant', response.output);
        }

        return {
          userMessage: this.conversationHistory[this.conversationHistory.length - 2],
          assistantMessage: this.conversationHistory[this.conversationHistory.length - 1]
        };
      },

      getHistory() {
        return [...this.conversationHistory];
      },

      clearHistory() {
        this.conversationHistory = [];
        this.pendingImage = null;
        console.log('Conversation history cleared');
      },

      getSessionId() {
        return this.sessionId;
      }
    };

    // Initialize
    ConversationManager.init();

    // ============================================================
    // UI INTEGRATION
    // ============================================================
    
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const imageInput = document.getElementById('imageInput');
    const chatMessages = document.getElementById('chatMessages');
    const previewArea = document.getElementById('previewArea');
    const webhookUrl = document.getElementById('webhookUrl');
    const status = document.getElementById('status');
    const clearBtn = document.getElementById('clearBtn');
    const sessionInfo = document.getElementById('sessionInfo');
    const messageCount = document.getElementById('messageCount');

    // Update session info
    sessionInfo.textContent = `Session: ${ConversationManager.getSessionId()}`;

    // Attach image handler
    attachBtn.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        try {
          await readImageAsBase64(file);
          previewArea.innerHTML = '';
          createImageThumbnail(ConversationManager.getPendingImage(), previewArea);
          showStatus('Image attached ✓', 'success', 2000);
        } catch (error) {
          showStatus('Failed to read image: ' + error.message, 'error', 4000);
        }
      }
    });

    // Send message handler
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      if (!webhookUrl.value.trim()) {
        showStatus('Please enter a webhook URL', 'error', 3000);
        return;
      }

      try {
        sendBtn.disabled = true;
        sendBtn.classList.add('loading');
        showStatus('Sending...', 'loading');

        const response = await ConversationManager.sendToWebhook(text, webhookUrl.value);
        ConversationManager.processResponse(text, response);

        // Render messages
        renderMessage('user', text);
        renderMessage(response.isImage ? 'image' : 'assistant', response.output);

        messageInput.value = '';
        previewArea.innerHTML = '';
        messageCount.textContent = ConversationManager.getHistory().length;

        showStatus('Message sent ✓', 'success', 2000);
      } catch (error) {
        showStatus('Error: ' + error.message, 'error', 5000);
      } finally {
        sendBtn.disabled = false;
        sendBtn.classList.remove('loading');
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Clear chat
    clearBtn.addEventListener('click', () => {
      ConversationManager.clearHistory();
      chatMessages.innerHTML = '';
      previewArea.innerHTML = '';
      messageInput.value = '';
      messageCount.textContent = '0';
      showStatus('Chat cleared ✓', 'success', 2000);
    });

    // Utility functions
    async function readImageAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const base64 = e.target.result;
          ConversationManager.setPendingImage(base64);
          resolve(base64);
        };
        reader.onerror = () => reject(new Error('Failed to read image'));
        reader.readAsDataURL(file);
      });
    }

    function createImageThumbnail(base64String, container) {
      const thumb = document.createElement('div');
      thumb.className = 'image-thumbnail-preview';

      const img = document.createElement('img');
      img.src = base64String;
      img.alt = 'Attached image preview';

      const badge = document.createElement('div');
      badge.className = 'image-badge';
      badge.textContent = '📎 Attached';

      thumb.appendChild(img);
      thumb.appendChild(badge);
      container.appendChild(thumb);

      return thumb;
    }

    function renderMessage(role, content) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${role === 'image' ? 'assistant' : role}`;

      if (role === 'image') {
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const img = document.createElement('img');
        img.src = content;
        img.className = 'message-image';
        img.alt = 'Generated image';
        bubble.appendChild(img);
        msgEl.appendChild(bubble);
      } else {
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = content;
        msgEl.appendChild(bubble);
      }

      chatMessages.appendChild(msgEl);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showStatus(message, type, duration = 3000) {
      status.textContent = message;
      status.className = `status visible ${type}`;
      if (duration) {
        setTimeout(() => {
          status.classList.remove('visible');
        }, duration);
      }
    }
  </script>
</body>
</html>
